name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  BUN_VERSION: "1.3.10"
  NODE_VERSION: "22"
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js (fallback for tools that require it)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run turbo run lint --affected

      - name: Typecheck
        run: bun run turbo run typecheck --affected

      - name: Test
        run: bun run turbo run test --affected

      - name: Knip (dead code + unused deps)
        run: bun run knip --no-exit-code

      - name: Dependency-cruiser (layer boundaries per ADR-002)
        run: bun run depcruise --config .dependency-cruiser.json packages apps

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
