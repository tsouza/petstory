name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.0.0"
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --affected

      - name: Typecheck
        run: pnpm turbo run typecheck --affected

      - name: Test
        run: pnpm turbo run test --affected

      - name: Knip (dead code + unused deps)
        run: pnpm knip --no-exit-code

      - name: Dependency-cruiser (layer boundaries per ADR-002)
        run: pnpm depcruise --config .dependency-cruiser.json packages apps

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
