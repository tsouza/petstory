name: Release

# Changesets-driven version management. All packages are currently `private: true`,
# so this workflow only creates/updates the "Version Packages" PR that bumps versions
# and writes CHANGELOGs. Publishing is intentionally NOT wired — it will be added when
# we decide to publish the kernel (see ADR-005 + ADR-007 publishing stance).

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  BUN_VERSION: "1.3.10"
  NODE_VERSION: "22"
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  release:
    name: Create Version PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js (fallback for tools that require it)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Just
        uses: extractions/setup-just@v2
        with:
          just-version: "1.46"

      - name: Install dependencies
        run: just install frozen

      - name: Create Version PR
        uses: changesets/action@v1
        with:
          version: bunx changeset version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
