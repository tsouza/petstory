# Bun config.
# Strict peer dependency posture carried over from the previous .npmrc.

[install]
exact = false
# Flat/hoisted node_modules so Metro + Babel + Tailwind's Node require.resolve
# traversal works. Bun's default isolated linker breaks Expo bundling because
# transitive plugins (babel-preset-expo → @babel/plugin-transform-react-jsx,
# react-native-worklets, etc.) live under .bun cache paths Metro can't find.
linker = "hoisted"
# Auto-install peer dependencies — required for the Expo/Metro/Babel plugin
# cascade to resolve. The strict `peer = true` posture we had earlier blocked
# too many transitive plugins from landing in node_modules.
auto = true
