# Lefthook git hooks.
# Each hook invokes a `just` target so the dev-loop command and the hook command stay identical.
# Fresh clones need `just install-hooks` after `just install`.
# Gitleaks runs in CI (GitHub Action), not locally, to avoid forcing every dev to install the Go binary.

pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{ts,tsx,js,jsx,json,jsonc}"
      run: just check-staged
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: just commitlint {1}

pre-push:
  parallel: true
  commands:
    branch-name:
      run: just verify-branch
    typecheck:
      run: just affected typecheck
    knip:
      run: just knip
